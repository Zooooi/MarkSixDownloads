<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark 6 Stats</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #444444, #000000);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            overflow: auto;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .logo {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.2));
            margin-bottom: 15px;
        }
        .brand-name { font-size: 18px; letter-spacing: 1px; color: #AAA; }
        .content{font-size: 14px; color: #999; max-width: 600px; line-height: 2em;padding: 10px 10px;}
        .footer { padding-bottom: 40px; text-align: center; padding: 20px 0;}
        .footer-nav { margin-bottom: 10px; }
        .footer-nav a {
            color: #bbbbbb;
            font-size: 13px;
            text-decoration: none;
            margin: 0 12px;
            transition: color 0.2s;
            display: inline-block; /* 增加可偵測面積 */
        }
        .footer-nav a:hover { color: #ffffff; text-decoration: underline; }
        .divider { color: #555555; font-size: 12px; }
        .copyright { color: #666666; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>
    <main class="container">
        <img src="images/site_logo.webp" alt="Mark 6 Stats Logo" class="logo">
        <div class="brand-name">Mark 6 Stats</div>
        <div class="content">
            Mark 6 Stats is built on a decentralized concept, integrating all records into a local data model for statistical queries, number filtering, records management, and automatic prize checking.<br>
        </div>

    </main>
    <footer class="footer">
        <nav class="footer-nav">
            <a href="terms-and-privacy.html" target="_blank">
                Privacy Policy
            </a>
            <span class="divider">|</span>
            <a href="terms-and-privacy.html" target="_blank">
                Terms of Service
            </a>
        </nav>
        <div class="copyright">&copy; 2024 Mark 6 Stats. All rights reserved. 版權所有</div>
    </footer>
</body>
</html>
