<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Six Stats</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, grey, black);
            margin: 0;
        }
        .container {
            text-align: center;
        }
        .image {
            width: 100px;
            height: 100px;
            filter: drop-shadow(1px 1px 15px rgba(255, 255, 255, 0.2));
        }
        .text {
            color: white;
            font-size: 12px;
            margin-top: 10px;
        }
        .link {
            margin-top: 15px;
        }
        .link a {
            color: #aaaaaa;
            font-size: 12px;
            text-decoration: none;
        }
        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="container">
        <img src="images/site_logo.webp" alt="Logo" class="image">
        <div class="text">Mark Six Stats</div>
        <div class="link">
            <a href="https://app.mark6stats.com/terms-and-privacy.html" target="_blank">
                服務條款與隱私政策 / Terms of Service and Privacy Policy
            </a>
        </div>
    </div>
</body>
</html>
