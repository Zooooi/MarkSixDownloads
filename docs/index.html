<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Six Stats</title>
    <style>
        /* 基礎樣式重置 */
        * {
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #444444, #000000);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 主內容區 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.3));
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .app-name {
            color: white;
            font-size: 18px;
            font-weight: 500;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* 頁尾連結區 (Google 審核重點) */
        .footer {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #bbbbbb;
            font-size: 13px;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .footer-links a:hover {
            color: #ffffff;
            border-bottom: 1px solid #ffffff;
        }

        .copyright {
            color: #666666;
            font-size: 11px;
            margin-top: 10px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <main class="main-content">
        <img src="images/site_logo.webp" alt="Mark Six Stats Logo" class="logo">
        <h1 class="app-name">Mark Six Stats</h1>
    </main>

    <footer class="footer">
        <nav class="footer-links">
            <a href="https://app.mark6stats.com/terms-and-privacy.html" target="_blank">
                Privacy Policy (隱私權政策)
            </a>
            <a href="https://app.mark6stats.com/terms-and-privacy.html" target="_blank">
                Terms of Service (服務條款)
            </a>
        </nav>
        <div class="copyright">
            &copy; 2026 Mark Six Stats. All rights reserved.
        </div>
    </footer>

</body>
</html>
