<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark 6 Stats</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #444444, #000000);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.2));
            margin-bottom: 15px;
        }

        .brand-name {
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* 頁尾連結樣式 - 確保清晰可見 */
        .footer {
            padding-bottom: 40px;
            text-align: center;
        }

        .footer-nav {
            margin-bottom: 10px;
        }

        .footer-nav a {
            color: #bbbbbb;
            font-size: 13px;
            text-decoration: none;
            margin: 0 12px;
            transition: color 0.2s, border-bottom 0.2s;
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
        }

        .footer-nav a:hover {
            color: #ffffff;
            border-bottom: 1px solid #ffffff;
        }

        .divider {
            color: #555555;
            font-size: 12px;
            user-select: none;
        }

        .copyright {
            color: #666666;
            font-size: 11px;
            margin-top: 10px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <img src="images/site_logo.webp" alt="Mark 6 Stats Logo" class="logo">
        <h1 class="brand-name">Mark 6 Stats</h1>
    </div>

    <footer class="footer">
        <nav class="footer-nav">
            <a href="https://app.mark6stats.com/terms-and-privacy.html" target="_blank" rel="noopener">
                Privacy Policy (隱私權政策)
            </a>
            <span class="divider">|</span>
            <a href="https://app.mark6stats.com/terms-and-privacy.html" target="_blank" rel="noopener">
                Terms of Service (服務條款)
            </a>
        </nav>
        <div class="copyright">
            &copy; 2026 Mark 6 Stats. All rights reserved.
        </div>
    </footer>

</body>
</html>
