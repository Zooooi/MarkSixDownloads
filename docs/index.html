<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. 核心 SEO Meta 標籤 -->
    <title>Mark 6 Stats - 六合彩統計助手 | 免費去中心化統計查詢與自動對獎</title>
    <meta name="description" content="Mark 6 Stats 六合彩統計助手基於去中心化理念，將所有數據整合為本地數據模型。提供快速統計查詢、號碼篩選、記錄管理與自動模擬對獎功能，不涉及金錢交易，永久免費使用。">
    <meta name="keywords" content="Mark 6 Stats, 六合彩, 六合彩統計, 號碼篩選, 自動對獎, 記錄管理, 去中心化">
    <meta name="author" content="Mark 6 Stats">
    <meta name="robots" content="index, follow">

    <!-- 2. Open Graph (OG) 社交媒體分享卡片 -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Mark 6 Stats - 六合彩統計助手">
    <meta property="og:description" content="基於去中心化理念的本地數據統計助手，提供快速統計查詢、號碼篩選、記錄管理與自動模擬對獎。">
    <meta property="og:image" content="images/site_logo.webp">
    <meta property="og:locale" content="zh_HK">

    <!-- 3. Twitter Card 標籤 -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Mark 6 Stats - 六合彩統計助手">
    <meta name="twitter:description" content="基於去中心化理念的本地數據統計助手，提供快速統計查詢、號碼篩選、記錄管理與自動模擬對獎。">
    <meta name="twitter:image" content="images/site_logo.webp">

    <!-- 4. Favicon 與字型 -->
    <link rel="icon" href="favicon.ico" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- 5. JSON-LD 結構化資料 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Mark 6 Stats",
      "alternateName": "六合彩統計助手",
      "operatingSystem": "All",
      "applicationCategory": "UtilitiesApplication",
      "description": "Mark 6 Stats 六合彩統計助手基於去中心化理念，將所有記錄整合為本地數據模型，提供快速統計查詢、號碼篩選、記錄管理與自動對獎功能。",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "HKD"
      }
    }
    </script>

    <!-- 6. 腳本載入 -->
    <script src="assets/js/main.js" defer></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            loadPage('index-section', 'app-root');
        });
    </script>
</head>
<body>
    <div class="container index" >
        <img src="images/site_logo.webp" alt="Mark 6 Stats Logo" class="logo">
        
        <div class="brand title">Mark 6 Stats</div>
    
        
        <div class="app-download-btn">
            <!-- Android Logo 按鈕 -->
            <img src="images/logo-android-4096.png" 
                alt="Android App" 
                onclick="showQrModal('images/qrcode-android.png', 
                'https://play.google.com/store/apps/details?id=com.mark6stats.app', 
                'Google Play', 
                '')">
        </div>
        
        <!-- 動態內容會塞入呢度 -->
        <div id="app-root"></div>
    </div>

    <!-- 通用 Modal 彈窗容器 -->
    <div id="qr-modal" class="modal-overlay" onclick="closeQrModal(event)">
        <div class="modal-content">
            <span class="modal-close" onclick="closeQrModal(event, true)">&times;</span>
            <p><a id="modal-play-link" href="" target="_blank" rel="noopener noreferrer"></a></p> <!-- 💡 動態連結文字 -->
            <img id="modal-qr-img" src="" alt="QR Code">
            <p id="modal-title" class="modal-title"></p> 
        </div>
    </div>
</body>
</html>
